name: Artemis II Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: artemis2-state-${{ github.ref }}

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: |
          cat > config.json <<'JSON'
          {
            "TELEGRAM_BOT_TOKEN": "${TELEGRAM_BOT_TOKEN}",
            "TELEGRAM_CHAT_ID": "${TELEGRAM_CHAT_ID}",
            "SLACK_WEBHOOK_URL": "${SLACK_WEBHOOK_URL}",
            "STATE_PATH": "state.json",
            "POLL_URL": "https://www.nasa.gov/missions/artemis/artemis-2/nasa-sets-coverage-for-artemis-ii-moon-mission/",
            "USER_AGENT": "Artemis2Monitor-GHA"
          }
          JSON
          python artemis2_monitor.py
